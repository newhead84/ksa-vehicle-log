name: Update Fuel Price from Opinet

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch: {}

jobs:
  update-fuel-price:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Opinet average gasoline price
        id: fetch
        env:
          OPINET_API_KEY: ${{ secrets.OPINET_API_KEY }}
        run: |
          set -e
          RESPONSE=$(curl -s "https://www.opinet.co.kr/api/avgAllPrice.do?out=json&code=${OPINET_API_KEY}")
          echo "Opinet response: $RESPONSE"
          PRICE=$(echo "$RESPONSE" | jq -r '.RESULT.OIL[] | select(.PRODCD=="B027") | .PRICE')
          if [ -z "$PRICE" ] || [ "$PRICE" = "null" ]; then
            echo "Could not find B027 gasoline price"
            exit 1
          fi
          PRICE_ROUNDED=$(printf "%.0f" "$PRICE")
          echo "price=$PRICE_ROUNDED" >> "$GITHUB_OUTPUT"

      - name: Write to Firebase Realtime Database
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          PRICE: ${{ steps.fetch.outputs.price }}
        run: |
          set -e
          UPDATED_AT=$(TZ='Asia/Seoul' date +"%Y-%m-%d %H:%M KST")
          BODY=$(jq -n --arg price "$PRICE" --arg updatedAt "$UPDATED_AT" --arg source "opinet-B027" \
            '{price: ($price|tonumber), updatedAt: $updatedAt, source: $source}')
          echo "Writing: $BODY"

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" -X PUT "${FIREBASE_URL}/fuel-price.json" \
            -H "Content-Type: application/json" \
            -d "$BODY")

          echo "HTTP status: $HTTP_STATUS"
          echo "Firebase response body:"
          cat response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Firebase write failed with HTTP $HTTP_STATUS"
            exit 1
          fi

          if grep -q '"error"' response.json; then
            echo "Firebase returned an error (likely a security rules / permission issue)"
            exit 1
          fi

      - name: Verify the value was actually written
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
        run: |
          set -e
          RESULT=$(curl -s "${FIREBASE_URL}/fuel-price.json")
          echo "Current fuel-price value: $RESULT"
          if [ "$RESULT" = "null" ]; then
            echo "fuel-price is still null after write - check database rules"
            exit 1
          fi
